<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Autonomous Defense</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  #gameCanvas {
    display: block;
    margin: 0 auto;
    background: radial-gradient(ellipse at center, #04061a 0%, #000000 100%);
  }
  #hud {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    width: 800px;
    display: flex;
    justify-content: space-between;
    color: #7fffd4;
    font-size: 18px;
    text-shadow: 0 0 8px #00ffe0;
    pointer-events: none;
  }
  #wrapper {
    position: relative;
    width: 800px;
    margin: 20px auto;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 800px; height: 600px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ff4d6d;
    font-size: 32px;
    text-shadow: 0 0 15px #ff0033;
    background: rgba(0,0,0,0.4);
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="wrapper">
  <div id="hud">
    <div id="score">SCORE: 0</div>
    <div id="wave">WAVE: 1</div>
    <div id="lives">LIVES: ❤❤❤</div>
  </div>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <div id="overlay"></div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const scoreEl = document.getElementById('score');
const waveEl = document.getElementById('wave');
const livesEl = document.getElementById('lives');
const overlayEl = document.getElementById('overlay');

// ---------- Utility ----------
function rand(a, b) { return a + Math.random() * (b - a); }
function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ---------- Starfield ----------
const stars = [];
for (let i = 0; i < 120; i++) {
  stars.push({
    x: rand(0, W), y: rand(0, H),
    r: rand(0.3, 1.8), speed: rand(10, 60),
    tw: rand(0, Math.PI * 2)
  });
}

// ---------- Game state ----------
let score = 0;
let wave = 1;
let lives = 3;
let gameOver = false;
let gameWon = false;
let frame = 0;

// ---------- Particles (explosions / trails) ----------
const particles = [];
function spawnExplosion(x, y, color, count = 18, speed = 3) {
  for (let i = 0; i < count; i++) {
    const ang = rand(0, Math.PI * 2);
    const spd = rand(speed * 0.3, speed);
    particles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      life: rand(0.4, 0.9),
      maxLife: rand(0.4, 3.9),
      color,
      size: rand(1.5, 3.5)
    });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.96; p.vy *= 0.96;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    const a = clamp(p.life / p.maxLife, 0, 1);
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ---------- Screen shake ----------
let shake = 0;
function addShake(amount) { shake = Math.min(shake + amount, 18); }

// ---------- Player Ship (AI controlled) ----------
const ship = {
  x: W / 2, y: H - 50,
  w: 46, h: 34,
  speed: 260,
  cooldown: 0,
  fireRate: 0.28,
  hitFlash: 0,
  targetX: W / 2
};

const bullets = []; // player bullets
const bombs = [];   // alien bombs

function shipAI(dt) {
  // 1. Find the most dangerous incoming bomb (closest vertically, roughly aligned)
  let dangerBomb = null;
  let bestDanger = -Infinity;
  for (const b of bombs) {
    const timeToImpact = (ship.y - b.y) / b.vy;
    if (timeToImpact > 0 && timeToImpact < 2.2) {
      const danger = 1 / (timeToImpact + 0.1);
      if (danger > bestDanger) { bestDanger = danger; dangerBomb = { bomb: b, tti: timeToImpact }; }
    }
  }

  // 2. Find best alien target (nearest diving alien, else nearest by x in formation)
  let target = null;
  let bestScore = Infinity;
  for (const a of aliens) {
    if (!a.alive) continue;
    const priority = a.state === 'diving' ? 0 : 1;
    const d = Math.abs(a.x - ship.x) + priority * -500;
    if (d < bestScore) { bestScore = d; target = a; }
  }

  // 3. Decide movement target
  if (dangerBomb) {
    // Evade: move away from predicted impact x
    const impactX = dangerBomb.bomb.x;
    if (impactX < ship.x) ship.targetX = clamp(ship.x + 140, ship.w, W - ship.w);
    else ship.targetX = clamp(ship.x - 140, ship.w, W - ship.w);
  } else if (target) {
    // Align under target to shoot it, with slight lead
    ship.targetX = clamp(target.x, ship.w, W - ship.w);
  } else {
    ship.targetX = W / 2;
  }

  // Smooth movement toward targetX
  const dx = ship.targetX - ship.x;
  const move = clamp(dx, -ship.speed * dt, ship.speed * dt);
  ship.x += move;
  ship.x = clamp(ship.x, ship.w / 2 + 4, W - ship.w / 2 - 4);

  // 4. Fire when roughly aligned with a live alien
  ship.cooldown -= dt;
  if (ship.cooldown <= 0) {
    const alignedTarget = aliens.find(a => a.alive && Math.abs(a.x - ship.x) < 22);
    if (alignedTarget || Math.random() < 0.02) {
      bullets.push({ x: ship.x, y: ship.y - ship.h / 2, vy: -520 });
      ship.cooldown = ship.fireRate;
    }
  }

  if (ship.hitFlash > 0) ship.hitFlash -= dt;
}

function drawShip() {
  ctx.save();
  ctx.translate(ship.x, ship.y);
  const flash = ship.hitFlash > 0;
  // engine glow
  const glow = 6 + Math.sin(frame * 0.3) * 3;
  ctx.fillStyle = 'rgba(0, 200, 255, 0.5)';
  ctx.beginPath();
  ctx.ellipse(0, ship.h / 2 + 2, 10, glow, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = flash ? '#ff4d6d' : '#c9f7ff';
  ctx.strokeStyle = flash ? '#ff8fa3' : '#00e5ff';
  ctx.lineWidth = 2;
  ctx.shadowColor = flash ? '#ff0033' : '#00e5ff';
  ctx.shadowBlur = 14;

  ctx.beginPath();
  ctx.moveTo(0, -ship.h / 2);
  ctx.lineTo(ship.w / 2, ship.h / 2);
  ctx.lineTo(ship.w / 4, ship.h / 2 - 6);
  ctx.lineTo(-ship.w / 4, ship.h / 2 - 6);
  ctx.lineTo(-ship.w / 2, ship.h / 2);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.restore();
}

// ---------- Aliens ----------
const aliens = [];
const ALIEN_ROWS = 3;
const ALIEN_COLS = 5; // 15 aliens
const alienColors = ['#ff6ec7', '#7cffb2', '#ffd166', '#7ad7ff'];

function setupAliens() {
  aliens.length = 0;
  const marginX = 90;
  const spacingX = (W - marginX * 2) / (ALIEN_COLS - 1);
  const spacingY = 55;
  for (let r = 0; r < ALIEN_ROWS; r++) {
    for (let c = 0; c < ALIEN_COLS; c++) {
      aliens.push({
        homeX: marginX + c * spacingX,
        homeY: 70 + r * spacingY,
        x: marginX + c * spacingX,
        y: 70 + r * spacingY,
        w: 32, h: 24,
        alive: true,
        state: 'formation', // formation | diving | returning
        diveT: 0,
        divePath: null,
        color: alienColors[r % alienColors.length],
        bombCooldown: rand(1, 3),
        wobble: rand(0, Math.PI * 2)
      });
    }
  }
}

let formationDir = 1;
let formationOffsetX = 0;
let diveTimer = 2;

function updateAliens(dt) {
  // Formation sway
  formationOffsetX += formationDir * 24 * dt;
  if (Math.abs(formationOffsetX) > 60) formationDir *= -1;

  const aliveCount = aliens.filter(a => a.alive).length;
  const diveChance = 0.4 + (wave - 1) * 0.08;

  diveTimer -= dt;
  if (diveTimer <= 0 && aliveCount > 0) {
    diveTimer = rand(1.2, 2.2) / Math.max(0.6, diveChance);
    const candidates = aliens.filter(a => a.alive && a.state === 'formation');
    if (candidates.length > 0 && Math.random() < 0.85) {
      const chosen = candidates[Math.floor(rand(0, candidates.length))];
      startDive(chosen);
    }
  }

  for (const a of aliens) {
    if (!a.alive) continue;
    a.wobble += dt * 2;

    if (a.state === 'formation') {
      a.x = a.homeX + formationOffsetX;
      a.y = a.homeY + Math.sin(a.wobble) * 3;

      a.bombCooldown -= dt;
      // occasional bomb drop even from formation, low chance
      if (a.bombCooldown <= 0) {
        a.bombCooldown = rand(3, 6) - wave * 0.1;
        if (Math.random() < 0.25) dropBomb(a);
      }
    } else if (a.state === 'diving') {
      a.diveT += dt;
      const p = a.divePath;
      const t = clamp(a.diveT / p.duration, 0, 1);
      // Quadratic bezier-ish swoop
      const mt = 1 - t;
      a.x = mt * mt * p.x0 + 2 * mt * t * p.cx + t * t * p.x1;
      a.y = mt * mt * p.y0 + 2 * mt * t * p.cy + t * t * p.y1;

      if (t > 0.45 && !a.hasBombed) {
        dropBomb(a);
        a.hasBombed = true;
      }
      if (t >= 1) {
        a.state = 'returning';
        a.diveT = 0;
      }
    } else if (a.state === 'returning') {
      a.diveT += dt;
      const t = clamp(a.diveT / 1.2, 0, 1);
      a.x = a.x + (a.homeX + formationOffsetX - a.x) * 0.06;
      a.y = a.y + (a.homeY - a.y) * 0.06;
      if (t >= 1 || (Math.abs(a.x - (a.homeX + formationOffsetX)) < 4 && Math.abs(a.y - a.homeY) < 4)) {
        a.state = 'formation';
        a.x = a.homeX + formationOffsetX;
        a.y = a.homeY;
      }
    }
  }
}

function startDive(a) {
  a.state = 'diving';
  a.diveT = 0;
  a.hasBombed = false;
  const targetX = clamp(ship.x + rand(-40, 40), 30, W - 30);
  a.divePath = {
    x0: a.x, y0: a.y,
    cx: a.x + rand(-150, 150), cy: H * 0.55,
    x1: targetX, y1: H - 90,
    duration: rand(1.6, 2.2)
  };
}

function dropBomb(a) {
  bombs.push({ x: a.x, y: a.y + 10, vy: 190 + wave * 12, wobble: rand(0, Math.PI * 2) });
}

function drawAliens() {
  for (const a of aliens) {
    if (!a.alive) continue;
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.shadowColor = a.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = a.color;
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1.5;

    // Body
    ctx.beginPath();
    ctx.ellipse(0, 0, a.w / 2, a.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Eyes
    ctx.fillStyle = '#0a0a0a';
    ctx.beginPath();
    ctx.arc(-6, -2, 3, 0, Math.PI * 2);
    ctx.arc(6, -2, 3, 0, Math.PI * 2);
    ctx.fill();

    // Legs/antennae wobble
    ctx.strokeStyle = a.color;
    ctx.lineWidth = 2;
    const legWobble = Math.sin(a.wobble * 3) * 4;
    ctx.beginPath();
    ctx.moveTo(-10, a.h / 2 - 2);
    ctx.lineTo(-14 + legWobble, a.h / 2 + 8);
    ctx.moveTo(10, a.h / 2 - 2);
    ctx.lineTo(14 - legWobble, a.h / 2 + 8);
    ctx.stroke();

    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// ---------- Bullets & Bombs update/draw ----------
function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.y += b.vy * dt;
    if (b.y < -10) { bullets.splice(i, 1); continue; }

    for (const a of aliens) {
      if (!a.alive) continue;
      if (dist(b.x, b.y, a.x, a.y) < a.w / 2 + 4) {
        a.alive = false;
        spawnExplosion(a.x, a.y, a.color, 24, 3.5);
        addShake(4);
        score += a.state === 'diving' ? 150 : 100;
        scoreEl.textContent = 'SCORE: ' + score;
        bullets.splice(i, 1);
        break;
      }
    }
  }
}

function drawBullets() {
  for (const b of bullets) {
    ctx.save();
    ctx.shadowColor = '#00ffe0';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#e0ffff';
    ctx.fillRect(b.x - 2, b.y - 8, 4, 14);
    ctx.restore();
  }
}

function updateBombs(dt) {
  for (let i = bombs.length - 1; i >= 0; i--) {
    const bm = bombs[i];
    bm.y += bm.vy * dt;
    bm.wobble += dt * 5;
    bm.x += Math.sin(bm.wobble) * 0.6;

    if (bm.y > H + 10) { bombs.splice(i, 1); continue; }

    if (dist(bm.x, bm.y, ship.x, ship.y) < ship.w / 2) {
      bombs.splice(i, 1);
      spawnExplosion(ship.x, ship.y, '#ff4d6d', 30, 4.5);
      addShake(10);
      ship.hitFlash = 0.4;
      lives--;
      livesEl.textContent = 'LIVES: ' + '❤'.repeat(Math.max(lives, 0));
      if (lives <= 0) triggerGameOver(false);
    }
  }
}

function drawBombs() {
  for (const bm of bombs) {
    ctx.save();
    ctx.shadowColor = '#ff884d';
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#ff884d';
    ctx.beginPath();
    ctx.arc(bm.x, bm.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ---------- Wave management ----------
function checkWaveClear() {
  if (aliens.every(a => !a.alive)) {
    wave++;
    if (wave > 8) {
      triggerGameOver(true);
      return;
    }
    waveEl.textContent = 'WAVE: ' + wave;
    setupAliens();
    diveTimer = 1.5;
  }
}

function triggerGameOver(won) {
  gameOver = true;
  gameWon = won;
  overlayEl.textContent = won ? 'ALL WAVES CLEARED — VICTORY' : 'GAME OVER';
}

// ---------- Main loop ----------
let lastTime = performance.now();
function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  frame++;

  if (!gameOver) {
    shipAI(dt);
    updateAliens(dt);
    updateBullets(dt);
    updateBombs(dt);
    updateParticles(dt);
    checkWaveClear();
  } else {
    updateParticles(dt);
  }

  if (shake > 0) shake *= 0.9;
  if (shake < 0.1) shake = 0;

  render();
  requestAnimationFrame(loop);
}

function render() {
  ctx.save();
  if (shake > 0) {
    ctx.translate(rand(-shake, shake), rand(-shake, shake));
  }

  // background
  ctx.fillStyle = '#04061a';
  ctx.fillRect(-20, -20, W + 40, H + 40);

  // stars
  for (const s of stars) {
    s.y += s.speed * 0.016;
    if (s.y > H) { s.y = 0; s.x = rand(0, W); }
    s.tw += 0.05;
    ctx.globalAlpha = 0.5 + Math.sin(s.tw) * 0.5;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  drawAliens();
  drawBombs();
  drawBullets();
  drawParticles();
  if (!gameOver) drawShip();

  ctx.restore();
}

setupAliens();
requestAnimationFrame(loop);
</script>
</body>
</html>
