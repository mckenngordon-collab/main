<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spaceship Defense</title>
<style>
  html, body {
    margin: 0; padding: 0; overflow: hidden;
    background: radial-gradient(ellipse at center, #0a0e1a 0%, #000000 100%);
    height: 100%; width: 100%;
    font-family: 'Courier New', monospace;
  }
  canvas { display: block; }
  #hud {
    position: fixed; top: 12px; left: 12px;
    color: #7fffd4; font-size: 15px; line-height: 1.5;
    text-shadow: 0 0 6px rgba(127,255,212,0.7);
    pointer-events: none;
    user-select: none;
  }
  #hud .label { color: #4a6fa5; }
  #gameover {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #ff5555; font-size: 42px; text-shadow: 0 0 20px #ff0000;
    display: none; text-align: center; user-select: none;
  }
  #gameover div.sub {
    font-size: 16px; color: #ffaaaa; margin-top: 10px;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
  <div><span class="label">SCORE</span> <span id="score">0</span></div>
  <div><span class="label">WAVE</span> <span id="wave">1</span></div>
  <div><span class="label">HULL</span> <span id="hull">100</span>%</div>
</div>
<div id="gameover">SHIP DESTROYED<div class="sub">Refresh to redeploy</div></div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H, CX, CY;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2; CY = H / 2;
}
resize();
window.addEventListener('resize', resize);

// ---------- Utility ----------
function rand(min, max) { return Math.random() * (max - min) + min; }
function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
function angleTo(x1, y1, x2, y2) { return Math.atan2(y2 - y1, x2 - x1); }
function normalizeAngle(a) {
  while (a > Math.PI) a -= Math.PI * 2;
  while (a < -Math.PI) a += Math.PI * 2;
  return a;
}

// ---------- Game state ----------
let score = 0;
let wave = 1;
let hull = 100;
let gameOver = false;

const ship = {
  x: 0, y: 0, // set relative to center each frame
  angle: 0,
  targetAngle: 0,
  turnSpeed: 0.09,
  fireCooldown: 0,
  fireRate: 14, // frames between shots
  radius: 22
};

let aliens = [];
let bullets = [];
let particles = [];
let stars = [];
let shakeTime = 0;
let shakeMag = 0;
let frame = 0;

// ---------- Starfield ----------
function initStars() {
  stars = [];
  for (let i = 0; i < 40; i++) {
    stars.push({
      x: rand(0, W), y: rand(0, H),
      r: rand(0.3, 1.8),
      tw: rand(0, Math.PI * 2)
    });
  }
}
initStars();

// ---------- Alien spawning ----------
function spawnAlien() {
  const edge = Math.floor(rand(0, 4));
  let x, y;
  const margin = 60;
  if (edge === 0) { x = rand(0, W); y = -margin; }
  else if (edge === 1) { x = W + margin; y = rand(0, H); }
  else if (edge === 2) { x = rand(0, W); y = H + margin; }
  else { x = -margin; y = rand(0, H); }

  // Difficulty scales with wave
  const speed = rand(0.4, 1.1) + wave * 0.05;
  const accuracy = Math.min(0.98, rand(0.55, 0.85) + wave * 0.02); // how well it tracks toward ship
  const hp = 1 + Math.floor(wave / 4);
  const size = rand(11, 17);
  const hue = rand(90, 150); // green-ish aliens, varying

  aliens.push({
    x, y, speed, accuracy, hp, maxHp: hp,
    radius: size,
    hue,
    wobble: rand(0, Math.PI * 2),
    wobbleSpeed: rand(0.03, 0.08),
    vx: 0, vy: 0
  });
}

let spawnTimer = 0;
let spawnInterval = 90;
let alienBudget = 5; // aliens per wave, grows

function updateSpawning() {
  spawnTimer++;
  if (spawnTimer >= spawnInterval && alienBudget > 0) {
    spawnAlien();
    alienBudget--;
    spawnTimer = 0;
    spawnInterval = Math.max(28, 90 - wave * 3);
  }
  if (alienBudget <= 0 && aliens.length === 0) {
    wave++;
    alienBudget = 4 + wave * 2;
    document.getElementById('wave').textContent = wave;
  }
}

// ---------- Bullets ----------
function fireBullet() {
  const speed = 9;
  bullets.push({
    x: CX + Math.cos(ship.angle) * ship.radius,
    y: CY + Math.sin(ship.angle) * ship.radius,
    vx: Math.cos(ship.angle) * speed,
    vy: Math.sin(ship.angle) * speed,
    life: 90
  });
}

// ---------- Particles / explosions ----------
function explode(x, y, hue, count) {
  for (let i = 0; i < count; i++) {
    const a = rand(0, Math.PI * 2);
    const spd = rand(1, 5);
    particles.push({
      x, y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd,
      life: rand(20, 40),
      maxLife: 40,
      hue: hue + rand(-20, 20),
      size: rand(1.5, 4)
    });
  }
}

function screenShake(mag, time) {
  shakeMag = Math.max(shakeMag, mag);
  shakeTime = Math.max(shakeTime, time);
}

// ---------- AI targeting: pick nearest alien ----------
function findTarget() {
  let best = null, bestD = Infinity;
  for (const al of aliens) {
    const d = dist(CX, CY, al.x, al.y);
    if (d < bestD) { bestD = d; best = al; }
  }
  return best;
}

// ---------- Main update ----------
function update() {
  if (gameOver) return;
  frame++;

  // Ship auto-targeting rotation
  const target = findTarget();
  if (target) {
    ship.targetAngle = angleTo(CX, CY, target.x, target.y);
  } else {
    // idle slow scan
    ship.targetAngle += 0.003;
  }
  let diff = normalizeAngle(ship.targetAngle - ship.angle);
  ship.angle += diff * ship.turnSpeed;
  ship.angle = normalizeAngle(ship.angle);

  // Firing
  ship.fireCooldown--;
  const aimedWell = target && Math.abs(normalizeAngle(angleTo(CX, CY, target.x, target.y) - ship.angle)) < 0.15;
  if (ship.fireCooldown <= 0 && target && aimedWell) {
    fireBullet();
    ship.fireCooldown = ship.fireRate;
  }

  updateSpawning();

  // Update aliens
  for (const al of aliens) {
    al.wobble += al.wobbleSpeed;
    const idealAngle = angleTo(al.x, al.y, CX, CY);
    // accuracy determines how directly it beelines vs wobbles/drifts off course
    const wobbleAmount = (1 - al.accuracy) * 0.9;
    const moveAngle = idealAngle + Math.sin(al.wobble) * wobbleAmount;
    al.vx = Math.cos(moveAngle) * al.speed;
    al.vy = Math.sin(moveAngle) * al.speed;
    al.x += al.vx;
    al.y += al.vy;
  }

  // Bullet - alien collision
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    b.x += b.vx; b.y += b.vy; b.life--;
    let hit = false;
    for (let ai = aliens.length - 1; ai >= 0; ai--) {
      const al = aliens[ai];
      if (dist(b.x, b.y, al.x, al.y) < al.radius + 3) {
        al.hp--;
        hit = true;
        explode(b.x, b.y, al.hue, 6);
        if (al.hp <= 0) {
          explode(al.x, al.y, al.hue, 26);
          screenShake(6, 10);
          score += 10 * wave;
          document.getElementById('score').textContent = score;
          aliens.splice(ai, 1);
        }
        break;
      }
    }
    if (hit || b.life <= 0 || b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
      bullets.splice(bi, 1);
    }
  }

  // Alien - ship collision
  for (let ai = aliens.length - 1; ai >= 0; ai--) {
    const al = aliens[ai];
    if (dist(al.x, al.y, CX, CY) < al.radius + ship.radius - 6) {
      explode(al.x, al.y, al.hue, 30);
      explode(CX, CY, 0, 10);
      screenShake(14, 18);
      hull -= 12;
      hull = Math.max(0, hull);
      document.getElementById('hull').textContent = hull;
      aliens.splice(ai, 1);
      if (hull <= 0) {
        triggerGameOver();
      }
    }
  }

  // Particles
  for (let pi = particles.length - 1; pi >= 0; pi--) {
    const p = particles[pi];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.96; p.vy *= 0.96;
    p.life--;
    if (p.life <= 0) particles.splice(pi, 1);
  }

  if (shakeTime > 0) shakeTime--; else shakeMag *= 0.9;
}

function triggerGameOver() {
  gameOver = true;
  document.getElementById('gameover').style.display = 'block';
}

// ---------- Drawing ----------
function drawStars() {
  ctx.save();
  for (const s of stars) {
    const alpha = 0.4 + 0.6 * Math.abs(Math.sin(frame * 0.02 + s.tw));
    ctx.fillStyle = `rgba(200,220,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawShip() {
  ctx.save();
  ctx.translate(CX, CY);
  ctx.rotate(ship.angle);

  // engine glow
  const glow = 6 + Math.sin(frame * 0.3) * 2;
  ctx.shadowColor = '#4fd8ff';
  ctx.shadowBlur = glow * 2;

  // hull
  ctx.fillStyle = '#c9e9ff';
  ctx.strokeStyle = '#4fd8ff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(24, 0);
  ctx.lineTo(-14, -14);
  ctx.lineTo(-8, 0);
  ctx.lineTo(-14, 14);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // cockpit
  ctx.fillStyle = '#1f6fa8';
  ctx.beginPath();
  ctx.arc(4, 0, 5, 0, Math.PI * 2);
  ctx.fill();

  // thruster flame
  ctx.shadowBlur = 10;
  ctx.fillStyle = 'rgba(255,150,50,0.85)';
  ctx.beginPath();
  ctx.moveTo(-8, -5);
  ctx.lineTo(-8 - glow * 1.8, 0);
  ctx.lineTo(-8, 5);
  ctx.closePath();
  ctx.fill();

  ctx.restore();

  // hull ring indicator
  ctx.save();
  ctx.translate(CX, CY);
  ctx.strokeStyle = `rgba(127,255,212,${0.15 + hull / 400})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, ship.radius + 10, 0, Math.PI * 2 * (hull / 100));
  ctx.stroke();
  ctx.restore();
}

function drawAliens() {
  for (const al of aliens) {
    ctx.save();
    ctx.translate(al.x, al.y);
    const pulse = 1 + Math.sin(frame * 0.15 + al.wobble) * 0.08;
    ctx.scale(pulse, pulse);

    ctx.shadowColor = `hsl(${al.hue}, 100%, 55%)`;
    ctx.shadowBlur = 12;
    ctx.fillStyle = `hsl(${al.hue}, 80%, 45%)`;
    ctx.strokeStyle = `hsl(${al.hue}, 100%, 75%)`;
    ctx.lineWidth = 2;

    // spiky alien blob
    ctx.beginPath();
    const spikes = 7;
    for (let i = 0; i < spikes; i++) {
      const a = (i / spikes) * Math.PI * 2;
      const r = al.radius * (i % 2 === 0 ? 1 : 0.65);
      const px = Math.cos(a) * r, py = Math.sin(a) * r;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // eye
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, 0, al.radius * 0.28, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // hp pips for tougher aliens
    if (al.maxHp > 1) {
      ctx.save();
      ctx.translate(al.x, al.y - al.radius - 10);
      for (let i = 0; i < al.maxHp; i++) {
        ctx.fillStyle = i < al.hp ? '#ff5555' : 'rgba(255,255,255,0.2)';
        ctx.fillRect(i * 7 - (al.maxHp * 7) / 2, 0, 5, 3);
      }
      ctx.restore();
    }
  }
}

function drawBullets() {
  ctx.save();
  ctx.shadowColor = '#ffe066';
  ctx.shadowBlur = 8;
  for (const b of bullets) {
    ctx.fillStyle = '#ffe066';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  ctx.save();
  if (shakeMag > 0.2) {
    ctx.translate(rand(-shakeMag, shakeMag), rand(-shakeMag, shakeMag));
  }

  drawStars();
  drawParticles();
  drawAliens();
  drawBullets();
  drawShip();

  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
